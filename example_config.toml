[modbus]
url = "tcp://localhost:502"
unit_id = 1
timeout = 1000
poll_rate = 1000
reconnect_pause = 5000

[mqtt]
url = "mqtt://localhost:1883"
qos = 0
connect_retry = 1000
username = "my_username"
password = "my_password"
pub_topic = "my/special/topic"
pub_rate = 1000

[template_kv]
gateway_name = "my_gateway_name"
gateway_model= "my_gateway_model"
gateway_serial = "my_gateway_serial"
device_name = "my_device_name"
device_model = "my_device_model"
device_serial = "my_device_serial"
readings = [
    {holding_register = 40001, size = "UINT32", multiplier = 0.01, format = "%.2f", param_name = "my_param_name_1"},
    {holding_register = 40003, size = "UINT32", multiplier = 0.01, param_name = "my_param_name_2"},
    {holding_register = 40005, size = "UINT32", param_name = "my_param_name_3"}
]
